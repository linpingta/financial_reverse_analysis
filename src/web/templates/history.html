{% extends "base.html" %}

{% block title %}历史记录 - 逆向周期行业投资分析系统{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-900">历史记录</h1>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">筛选条件</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">日期</label>
                <input type="date" id="filter-date" class="input-field">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">行业</label>
                <select id="filter-industry" class="select-field">
                    <option value="">全部</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">信号</label>
                <select id="filter-signal" class="select-field">
                    <option value="">全部</option>
                    <option value="buy">买入</option>
                    <option value="sell">卖出</option>
                    <option value="hold">持有</option>
                </select>
            </div>
            
            <div class="flex items-end">
                <button id="apply-filter" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
                    应用筛选
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日期</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">行业</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">信号</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">评分</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PE分位数</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PB分位数</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody id="history-table" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="7" class="px-6 py-4 text-center text-gray-400">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
            <div class="text-sm text-gray-500">
                显示 <span id="showing-count">0</span> 条记录，共 <span id="total-count">0</span> 条
            </div>
            <div class="flex space-x-2">
                <button id="prev-page" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 disabled:opacity-50">
                    上一页
                </button>
                <span id="current-page" class="px-3 py-1 text-gray-700">1</span>
                <button id="next-page" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 disabled:opacity-50">
                    下一页
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    let currentPage = 1;
    let totalRecords = 0;
    const limit = 10;
    
    async function loadHistory() {
        const date = document.getElementById('filter-date').value;
        const industry = document.getElementById('filter-industry').value;
        const signal = document.getElementById('filter-signal').value;
        
        try {
            const params = new URLSearchParams({
                page: currentPage,
                limit: limit
            });
            
            if (date) params.append('date', date);
            if (industry) params.append('industry', industry);
            if (signal) params.append('signal', signal);
            
            const response = await fetch(`/api/history?${params}`);
            const data = await response.json();
            
            if (data.success) {
                updateHistoryTable(data.data);
                totalRecords = data.data.total;
                updatePagination();
            }
        } catch (error) {
            console.error('加载历史记录失败:', error);
            showToast('加载历史记录失败', 'error');
        }
    }
    
    async function loadIndustries() {
        try {
            const response = await fetch('/api/industries');
            const data = await response.json();
            
            if (data.success) {
                const select = document.getElementById('filter-industry');
                data.data.forEach(industry => {
                    const option = document.createElement('option');
                    option.value = industry;
                    option.textContent = industry;
                    select.appendChild(option);
                });
            }
        } catch (error) {
            console.error('加载行业列表失败:', error);
        }
    }
    
    function updateHistoryTable(data) {
        const tbody = document.getElementById('history-table');
        
        if (data.records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center text-gray-400">暂无数据</td></tr>';
            return;
        }
        
        tbody.innerHTML = data.records.map(record => {
            const signalClass = {
                'buy': 'bg-green-100 text-green-800',
                'sell': 'bg-red-100 text-red-800',
                'hold': 'bg-yellow-100 text-yellow-800'
            }[record.signal] || 'bg-gray-100 text-gray-800';
            
            const signalText = {
                'buy': '买入',
                'sell': '卖出',
                'hold': '持有'
            }[record.signal] || record.signal;
            
            return `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${record.run_date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${record.industry}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${signalClass}">
                            ${signalText}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${record.score}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatPercent(record.pe_percentile)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatPercent(record.pb_percentile)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <button onclick="viewDetail(${record.id})" class="text-blue-600 hover:text-blue-900">查看详情</button>
                    </td>
                </tr>
            `;
        }).join('');
        
        document.getElementById('showing-count').textContent = data.records.length;
        document.getElementById('total-count').textContent = data.total;
    }
    
    function updatePagination() {
        const totalPages = Math.ceil(totalRecords / limit);
        
        document.getElementById('current-page').textContent = currentPage;
        
        document.getElementById('prev-page').disabled = currentPage <= 1;
        document.getElementById('next-page').disabled = currentPage >= totalPages;
    }
    
    function viewDetail(id) {
        showToast('详情功能开发中...', 'info');
    }
    
    document.getElementById('apply-filter').addEventListener('click', function() {
        currentPage = 1;
        loadHistory();
    });
    
    document.getElementById('prev-page').addEventListener('click', function() {
        if (currentPage > 1) {
            currentPage--;
            loadHistory();
        }
    });
    
    document.getElementById('next-page').addEventListener('click', function() {
        const totalPages = Math.ceil(totalRecords / limit);
        if (currentPage < totalPages) {
            currentPage++;
            loadHistory();
        }
    });
    
    document.addEventListener('DOMContentLoaded', function() {
        loadIndustries();
        loadHistory();
    });
</script>
{% endblock %}
