{% extends "base.html" %}

{% block title %}行业分析 - 逆向周期行业投资分析系统{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-900">行业分析</h1>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">分析配置</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">分析模式</label>
                <div class="flex space-x-4">
                    <label class="flex items-center">
                        <input type="radio" name="mode" value="all" checked class="form-radio h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">全量分析</span>
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="mode" value="selected" class="form-radio h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">指定行业</span>
                    </label>
                </div>
            </div>

            <div id="industry-selector" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">选择行业</label>
                <div id="industry-checkboxes" class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <div class="text-center text-gray-400 py-4">加载中...</div>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <label class="flex items-center">
                    <input type="checkbox" name="save_db" checked class="form-checkbox h-4 w-4 text-blue-600">
                    <span class="ml-2 text-gray-700">保存到数据库</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" name="generate_report" class="form-checkbox h-4 w-4 text-blue-600">
                    <span class="ml-2 text-gray-700">生成报告</span>
                </label>
            </div>

            <div>
                <button id="start-analysis" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition flex items-center">
                    <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    开始分析
                </button>
            </div>
        </div>
    </div>

    <div id="progress-section" class="hidden bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">分析进度</h2>
        
        <div class="space-y-4">
            <div>
                <div class="flex justify-between mb-2">
                    <span class="text-sm font-medium text-gray-700">进度</span>
                    <span id="progress-percent" class="text-sm font-medium text-blue-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="flex items-center space-x-2">
                <div class="loading"></div>
                <span id="progress-message" class="text-sm text-gray-600">准备开始...</span>
            </div>
            
            <div id="current-industry" class="text-sm text-gray-500"></div>
        </div>
    </div>

    <div id="results-section" class="hidden bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">分析结果</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">行业</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">信号</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">评分</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PE分位数</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PB分位数</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                    </tr>
                </thead>
                <tbody id="results-table" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="6" class="px-6 py-4 text-center text-gray-400">等待分析完成...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    let currentTaskId = null;
    
    async function loadIndustries() {
        try {
            const response = await fetch('/api/industries');
            const data = await response.json();
            
            if (data.success) {
                const container = document.getElementById('industry-checkboxes');
                container.innerHTML = data.data.map(industry => `
                    <label class="flex items-center p-2 bg-gray-50 rounded hover:bg-gray-100">
                        <input type="checkbox" name="industry" value="${industry}" class="form-checkbox h-4 w-4 text-blue-600">
                        <span class="ml-2 text-sm text-gray-700">${industry}</span>
                    </label>
                `).join('');
            }
        } catch (error) {
            console.error('加载行业列表失败:', error);
            showToast('加载行业列表失败', 'error');
        }
    }
    
    document.querySelectorAll('input[name="mode"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const selector = document.getElementById('industry-selector');
            if (this.value === 'selected') {
                selector.classList.remove('hidden');
            } else {
                selector.classList.add('hidden');
            }
        });
    });
    
    document.getElementById('start-analysis').addEventListener('click', async function() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const industries = Array.from(document.querySelectorAll('input[name="industry"]:checked'))
            .map(cb => cb.value);
        const saveDb = document.querySelector('input[name="save_db"]').checked;
        const generateReport = document.querySelector('input[name="generate_report"]').checked;
        
        if (mode === 'selected' && industries.length === 0) {
            showToast('请选择至少一个行业', 'warning');
            return;
        }
        
        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    mode,
                    industries,
                    save_db: saveDb,
                    generate_report: generateReport
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentTaskId = data.task_id;
                showProgressSection();
                showToast('分析任务已启动', 'success');
            } else {
                showToast('启动分析失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('启动分析失败:', error);
            showToast('启动分析失败', 'error');
        }
    });
    
    function showProgressSection() {
        document.getElementById('progress-section').classList.remove('hidden');
        document.getElementById('results-section').classList.remove('hidden');
    }
    
    function handleProgressUpdate(data) {
        if (data.task_id === currentTaskId) {
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            const progressMessage = document.getElementById('progress-message');
            const currentIndustry = document.getElementById('current-industry');
            
            progressBar.style.width = data.progress + '%';
            progressPercent.textContent = data.progress + '%';
            progressMessage.textContent = data.message || '正在分析...';
            currentIndustry.textContent = data.current_item || '';
        }
    }
    
    function handleTaskComplete(data) {
        if (data.task_id === currentTaskId) {
            updateResultsTable(data.result);
            showToast('分析完成', 'success');
        }
    }
    
    function handleTaskError(data) {
        if (data.task_id === currentTaskId) {
            showToast('分析失败: ' + data.error, 'error');
        }
    }
    
    function updateResultsTable(result) {
        const tbody = document.getElementById('results-table');
        
        if (!result || !result.industries) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-400">无结果数据</td></tr>';
            return;
        }
        
        tbody.innerHTML = result.industries.map((industry, index) => `
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${industry}</td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                        买入
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${75 + index}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${(20 + index * 2).toFixed(2)}%</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${(15 + index * 2).toFixed(2)}%</td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                        完成
                    </span>
                </td>
            </tr>
        `).join('');
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        loadIndustries();
    });
</script>
{% endblock %}
