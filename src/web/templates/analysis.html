{% extends "base.html" %}

{% block title %}行业分析 - 逆向周期行业投资分析系统{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-900">行业分析</h1>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">分析配置</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">分析模式</label>
                <div class="flex space-x-4">
                    <label class="flex items-center">
                        <input type="radio" name="mode" value="all" checked class="form-radio h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">全量分析</span>
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="mode" value="selected" class="form-radio h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">指定行业</span>
                    </label>
                </div>
            </div>

            <div id="industry-selector" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">选择行业</label>
                <div id="industry-checkboxes" class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <div class="text-center text-gray-400 py-4">加载中...</div>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <label class="flex items-center">
                    <input type="checkbox" name="save_db" checked class="form-checkbox h-4 w-4 text-blue-600">
                    <span class="ml-2 text-gray-700">保存到数据库</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" name="generate_report" class="form-checkbox h-4 w-4 text-blue-600">
                    <span class="ml-2 text-gray-700">生成报告</span>
                </label>
            </div>

            <div>
                <button id="start-analysis" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition flex items-center">
                    <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    开始分析
                </button>
            </div>
        </div>
    </div>

    <div id="progress-section" class="hidden bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">分析进度</h2>
        
        <div class="space-y-4">
            <div>
                <div class="flex justify-between mb-2">
                    <span class="text-sm font-medium text-gray-700">进度</span>
                    <span id="progress-percent" class="text-sm font-medium text-blue-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="flex items-center space-x-2">
                <div class="loading"></div>
                <span id="progress-message" class="text-sm text-gray-600">准备开始...</span>
            </div>
            
            <div id="current-industry" class="text-sm text-gray-500"></div>
        </div>
    </div>

    <div id="results-section" class="hidden bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">分析结果</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">行业</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">信号</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">评分</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PE分位数</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PB分位数</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                    </tr>
                </thead>
                <tbody id="results-table" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="6" class="px-6 py-4 text-center text-gray-400">等待分析完成...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_head %}
<script src="{{ url_for('static', filename='js/analysis.js') }}" defer></script>
{% endblock %}

{% block extra_scripts %}
{% endblock %}
