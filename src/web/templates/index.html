{% extends "base.html" %}

{% block title %}首页 - 逆向周期行业投资分析系统{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-900">系统概览</h1>
        <a href="/analysis" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition flex items-center">
            <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            开始分析
        </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center">
                <div class="p-3 rounded-full bg-blue-100 text-blue-600">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                </div>
                <div class="ml-4">
                    <p class="text-sm font-medium text-gray-500">总记录数</p>
                    <p id="total-records" class="text-2xl font-semibold text-gray-900">-</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center">
                <div class="p-3 rounded-full bg-green-100 text-green-600">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                </div>
                <div class="ml-4">
                    <p class="text-sm font-medium text-gray-500">买入机会</p>
                    <p id="buy-signals" class="text-2xl font-semibold text-gray-900">-</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center">
                <div class="p-3 rounded-full bg-red-100 text-red-600">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"></path>
                    </svg>
                </div>
                <div class="ml-4">
                    <p class="text-sm font-medium text-gray-500">卖出预警</p>
                    <p id="sell-signals" class="text-2xl font-semibold text-gray-900">-</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center">
                <div class="p-3 rounded-full bg-purple-100 text-purple-600">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                    </svg>
                </div>
                <div class="ml-4">
                    <p class="text-sm font-medium text-gray-500">平均评分</p>
                    <p id="avg-score" class="text-2xl font-semibold text-gray-900">-</p>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">信号分布</h2>
            <div id="signal-chart" class="h-64 flex items-center justify-center text-gray-400">
                图表加载中...
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">行业评分排行 (Top 5)</h2>
            <div id="top-industries" class="space-y-3">
                <div class="text-center text-gray-400 py-8">加载中...</div>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">最新分析结果</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日期</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">行业</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">信号</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">评分</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PE分位数</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PB分位数</th>
                    </tr>
                </thead>
                <tbody id="latest-results" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="6" class="px-6 py-4 text-center text-gray-400">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    async function loadStats() {
        try {
            const response = await fetch('/api/stats');
            const data = await response.json();
            
            if (data.success) {
                const stats = data.data;
                document.getElementById('total-records').textContent = stats.total_records;
                document.getElementById('buy-signals').textContent = stats.buy_signals;
                document.getElementById('sell-signals').textContent = stats.sell_signals;
                document.getElementById('avg-score').textContent = stats.avg_score.toFixed(1);
                
                updateTopIndustries(stats.top_industries);
            }
        } catch (error) {
            console.error('加载统计数据失败:', error);
            showToast('加载统计数据失败', 'error');
        }
    }
    
    function updateTopIndustries(industries) {
        const container = document.getElementById('top-industries');
        container.innerHTML = industries.map((industry, index) => `
            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                <div class="flex items-center">
                    <span class="text-lg font-semibold text-gray-400 mr-3">#${index + 1}</span>
                    <span class="font-medium text-gray-900">${industry.name}</span>
                </div>
                <span class="text-lg font-semibold text-blue-600">${industry.score}</span>
            </div>
        `).join('');
    }
    
    async function loadLatestResults() {
        try {
            const response = await fetch('/api/history?page=1&limit=10');
            const data = await response.json();
            
            if (data.success) {
                updateResultsTable(data.data.records);
            }
        } catch (error) {
            console.error('加载最新结果失败:', error);
            showToast('加载最新结果失败', 'error');
        }
    }
    
    function updateResultsTable(records) {
        const tbody = document.getElementById('latest-results');
        
        if (records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-400">暂无数据</td></tr>';
            return;
        }
        
        tbody.innerHTML = records.map(record => {
            const signalClass = {
                'buy': 'bg-green-100 text-green-800',
                'sell': 'bg-red-100 text-red-800',
                'hold': 'bg-yellow-100 text-yellow-800'
            }[record.signal] || 'bg-gray-100 text-gray-800';
            
            const signalText = {
                'buy': '买入',
                'sell': '卖出',
                'hold': '持有'
            }[record.signal] || record.signal;
            
            return `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${record.run_date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${record.industry}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${signalClass}">
                            ${signalText}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${record.score}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatPercent(record.pe_percentile)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatPercent(record.pb_percentile)}</td>
                </tr>
            `;
        }).join('');
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        loadStats();
        loadLatestResults();
    });
</script>
{% endblock %}
