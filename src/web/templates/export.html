{% extends "base.html" %}

{% block title %}数据导出 - 逆向周期行业投资分析系统{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-900">数据导出</h1>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">导出配置</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">导出格式</label>
                <div class="flex space-x-4">
                    <label class="flex items-center">
                        <input type="radio" name="format" value="csv" checked class="form-radio h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">CSV</span>
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="format" value="excel" class="form-radio h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">Excel</span>
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="format" value="markdown" class="form-radio h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">Markdown</span>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">开始日期</label>
                    <input type="date" id="start-date" class="input-field">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">结束日期</label>
                    <input type="date" id="end-date" class="input-field">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">行业筛选</label>
                    <select id="export-industry" class="select-field">
                        <option value="">全部行业</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">信号筛选</label>
                <div class="flex space-x-4">
                    <label class="flex items-center">
                        <input type="checkbox" name="signal-filter" value="buy" checked class="form-checkbox h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">买入信号</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="signal-filter" value="sell" checked class="form-checkbox h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">卖出信号</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="signal-filter" value="hold" checked class="form-checkbox h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">持有信号</span>
                    </label>
                </div>
            </div>

            <div>
                <button id="generate-export" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition flex items-center">
                    <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    生成导出文件
                </button>
            </div>
        </div>
    </div>

    <div id="download-section" class="hidden bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">导出文件</h2>
        
        <div class="flex items-center space-x-4">
            <span id="export-filename" class="text-sm text-gray-700"></span>
            <a id="download-link" href="#" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition flex items-center">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                下载文件
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    async function loadIndustries() {
        try {
            const response = await fetch('/api/industries');
            const data = await response.json();
            
            if (data.success) {
                const select = document.getElementById('export-industry');
                data.data.forEach(industry => {
                    const option = document.createElement('option');
                    option.value = industry;
                    option.textContent = industry;
                    select.appendChild(option);
                });
            }
        } catch (error) {
            console.error('加载行业列表失败:', error);
        }
    }
    
    document.getElementById('generate-export').addEventListener('click', async function() {
        const format = document.querySelector('input[name="format"]:checked').value;
        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;
        const industry = document.getElementById('export-industry').value;
        const signals = Array.from(document.querySelectorAll('input[name="signal-filter"]:checked'))
            .map(cb => cb.value);
        
        try {
            const response = await fetch('/api/export', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    format,
                    filters: {
                        start_date: startDate,
                        end_date: endDate,
                        industry,
                        signals
                    }
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('export-filename').textContent = data.filename;
                document.getElementById('download-link').href = data.download_url;
                document.getElementById('download-section').classList.remove('hidden');
                showToast('导出文件已生成', 'success');
            } else {
                showToast('生成导出文件失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('生成导出文件失败:', error);
            showToast('生成导出文件失败', 'error');
        }
    });
    
    document.addEventListener('DOMContentLoaded', function() {
        loadIndustries();
    });
</script>
{% endblock %}
